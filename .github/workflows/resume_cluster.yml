name: ▶️ Reanudar Cluster Redshift

on:
  workflow_dispatch:
    inputs:
      motivo:
        description: "Motivo de la reanudación (opcional)"
        required: false
        default: "Ejecución pipeline segmentación"

jobs:
  resume:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install boto3 python-dotenv

      - name: Reanudar cluster
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            us-east-1
          REDSHIFT_CLUSTER_ID:   compliance-redshift-cluster
        run: python scripts/cluster_control.py resume

      - name: Commit cluster_status.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/cluster_status.json
          git diff --staged --quiet || git commit -m "data: cluster reanudado [skip ci]"
          git push
