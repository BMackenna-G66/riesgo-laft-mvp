name: 🔍 Segmentación LA/FT/FPADM

on:
  workflow_dispatch:         # trigger manual desde GitHub Actions
  schedule:
    - cron: '0 6 * * 1'     # cada lunes a las 06:00 UTC (desactivar si no se necesita)

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          REDSHIFT_HOST:     ${{ secrets.REDSHIFT_HOST }}
          REDSHIFT_PORT:     ${{ secrets.REDSHIFT_PORT }}
          REDSHIFT_DATABASE: ${{ secrets.REDSHIFT_DATABASE }}
          REDSHIFT_USER:     ${{ secrets.REDSHIFT_USER }}
          REDSHIFT_PASSWORD: ${{ secrets.REDSHIFT_PASSWORD }}
          LOG_LEVEL:         INFO
          MODEL_VERSION:     "1.0.0"
        run: |
          cd scripts
          python pipeline.py

      - name: Commit docs/data/results.json (actualiza dashboard)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/results.json outputs/model_centroids.json
          git diff --staged --quiet || git commit -m "data: actualiza results.json y centroides [skip ci]"
          git push

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: segmentacion-resultados-${{ github.run_id }}
          path: |
            outputs/segmentacion_laft_*.xlsx
            outputs/segmentacion_laft_*.txt
            outputs/model_centroids.json
            logs/pipeline_*.log
          retention-days: 30
