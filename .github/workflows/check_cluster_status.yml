name: 🔎 Verificar Estado Cluster

on:
  workflow_dispatch:
  # Verifica estado cada 30 minutos entre 08:00 y 22:00 UTC (lunes a viernes)
  schedule:
    - cron: '*/30 8-22 * * 1-5'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install boto3 python-dotenv

      - name: Verificar estado
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            us-east-1
          REDSHIFT_CLUSTER_ID:   compliance-redshift-cluster
        run: python scripts/cluster_control.py status

      - name: Commit cluster_status.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/cluster_status.json
          git diff --staged --quiet || git commit -m "data: estado cluster actualizado [skip ci]"
          git push
